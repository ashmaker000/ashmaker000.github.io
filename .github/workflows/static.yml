name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install htmlhint + stylelint + eslint
        run: npm i -g htmlhint stylelint stylelint-config-standard eslint

      - name: HTML lint
        run: htmlhint index.html

      - name: CSS lint
        run: stylelint "*.css" --config '{"extends":"stylelint-config-standard"}' || true

      - name: JS lint
        run: eslint script.js --no-eslintrc --env browser,es2021 --rule 'no-unused-vars: warn' --rule 'no-undef: error'

  deploy:
    needs: quality
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
